# SPDX-License-Identifier: GPL-2.0-only
# Release pipeline. On a version tag (e.g. v1.0.0-rc.1) this builds, tests, packs,
# SBOMs, checksums, and signs the NuGet packages KEYLESSLY via GitHub's OIDC
# identity (Sigstore build-provenance attestation), then publishes them all to a
# GitHub Release. It does NOT push to nuget.org.
#
# Signing model: no private key is stored anywhere. Authenticity is proven by the
# combination of each artifact's SHA-256 fingerprint and a provenance attestation
# bound to this repository's GitHub identity — verify with `gh attestation verify`.
# See docs/RELEASING.md.
#
# Actions are pinned to full commit SHAs (CRA/SLSA supply-chain hardening); the
# trailing `# vN` is the human-readable version. Bump BOTH when updating.
name: release
on:
  push:
    tags: [ 'v*' ]
permissions:
  contents: read
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the GitHub Release
      id-token: write       # OIDC for keyless Sigstore signing (ties to this repo's identity)
      attestations: write   # write the build-provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - run: dotnet restore DwarfMapper.NET.sln
      - run: dotnet build DwarfMapper.NET.sln -c Release --no-restore -p:Version=$VERSION -p:ContinuousIntegrationBuild=true
      - run: dotnet test DwarfMapper.NET.sln -c Release --no-build
      - run: dotnet pack DwarfMapper.NET.sln -c Release --no-build -o artifacts -p:Version=$VERSION -p:ContinuousIntegrationBuild=true

      # ── SBOM (CycloneDX, machine-readable — CRA Annex I) ─────────────────────
      - run: dotnet tool install --global CycloneDX --version 6.2.0
      - run: dotnet CycloneDX DwarfMapper.NET.sln -o artifacts/sbom

      # ── SHA-256 control hashes (the artifact "fingerprints") ─────────────────
      - name: Checksums
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.nupkg *.snupkg > SHA256SUMS
          echo "── SHA256SUMS ──"; cat SHA256SUMS

      # ── Keyless signature: SLSA build-provenance bound to the GitHub identity ─
      #    No stored key. Verify later with:
      #      gh attestation verify <pkg> --repo GimliCZ/DwarfMapper.NET
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      # ── Publish a GitHub Release with all artifacts ──────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*.nupkg artifacts/*.snupkg artifacts/SHA256SUMS artifacts/sbom/* \
            --title "$GITHUB_REF_NAME" \
            --notes "Keyless-signed via GitHub OIDC (Sigstore build-provenance — verify with \`gh attestation verify <pkg> --repo GimliCZ/DwarfMapper.NET\`), with a CycloneDX SBOM and SHA256SUMS attached. Not pushed to nuget.org automatically."
